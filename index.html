<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostra AR - Scultura Immersiva</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        model-viewer { width: 100%; height: 100%; }
        .ar-button {
            background-color: #ffffff; border-radius: 30px; border: none; 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 14px 28px; font-family: sans-serif; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="scultura.glb" 
        ios-src="scultura.usdz"
        alt="Scultura 3D in Realtà Aumentata" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="none">
        
        <button slot="ar-button" class="ar-button">
            Visualizza la scultura 👁️
        </button>
    </model-viewer>

</body>
</html>
